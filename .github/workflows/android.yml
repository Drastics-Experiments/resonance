name: Android

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Validate and build Android app
        run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Resonance-Android-Debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Package tagged Android release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ../installers/android/dist
          cp app/build/outputs/apk/debug/app-debug.apk "../installers/android/dist/Resonance-Android-${VERSION}.apk"
          cd ../installers/android/dist
          sha256sum "Resonance-Android-${VERSION}.apk" > "Resonance-Android-${VERSION}.apk.sha256"

      - name: Publish tagged Android release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/android/dist/Resonance-Android-*.apk
            installers/android/dist/Resonance-Android-*.apk.sha256
