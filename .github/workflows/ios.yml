name: iOS

on:
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Verify Xcode toolchain
        shell: bash
        run: |
          xcodebuild -version
          swift --version
          XCODE_MAJOR="$(xcodebuild -version | awk 'NR == 1 { split($2, version, "."); print version[1] }')"
          (( XCODE_MAJOR >= 26 ))

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project ios/LikedSongsMobile.xcodeproj \
            -scheme LikedSongsMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$RUNNER_TEMP/ResonanceDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator app
        uses: actions/upload-artifact@v7
        with:
          name: Resonance-iOS-Simulator-${{ github.sha }}
          path: ${{ runner.temp }}/ResonanceDerivedData/Build/Products/Debug-iphonesimulator/Resonance.app
          if-no-files-found: error

      - name: Package tagged iOS Simulator release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p installers/ios/dist
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/ResonanceDerivedData/Build/Products/Debug-iphonesimulator/Resonance.app" \
            "installers/ios/dist/Resonance-iOS-Simulator-${VERSION}.zip"
          cd installers/ios/dist
          shasum -a 256 "Resonance-iOS-Simulator-${VERSION}.zip" > "Resonance-iOS-Simulator-${VERSION}.zip.sha256"

      - name: Publish tagged iOS Simulator release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/ios/dist/Resonance-iOS-Simulator-*.zip
            installers/ios/dist/Resonance-iOS-Simulator-*.zip.sha256
