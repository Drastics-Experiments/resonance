<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; script-src 'self'; style-src 'self'; media-src 'self' file: blob:; img-src 'self' data: file:; connect-src 'none'">
  <title>Resonance</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shuffle-icon.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <nav>
        <button class="nav active" data-section="library"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="16" rx="1"/><path d="m17 5 4 14"/></svg><span>Library</span></button>
        <button class="nav" data-section="playlists"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h10M3 11h10M3 16h7"/><circle cx="17" cy="17" r="3"/><path d="M20 17V7l-6 1.5"/></svg><span>Playlists</span></button>
        <button class="nav" data-section="storage"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 14h18"/><circle cx="17.5" cy="16.5" r=".75"/></svg><span>Song Storage</span></button>
        <button class="nav" data-section="server"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="7" rx="2"/><rect x="3" y="14" width="18" height="7" rx="2"/><path d="M7 6.5h.01M7 17.5h.01M11 6.5h7M11 17.5h7"/></svg><span>Music Server</span></button>
      </nav>
      <div class="side-heading"><span>Your playlists</span><button id="newPlaylist" title="New Playlist">＋</button></div>
      <div id="sidebarPlaylists" class="playlist-links"></div>
      <div class="update-panel"><button id="checkForUpdates"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v6h-6"/></svg><span><strong>Check for updates</strong><small id="updateStatus">GitHub Releases</small></span></button><button id="installUpdate" hidden>Restart to update</button></div>
    </aside>

    <main>
      <header class="topbar"><div class="history-buttons"><button id="navBack" disabled>‹</button><button id="navForward" disabled>›</button></div><div class="top-search-group"><label class="search"><span>⌕</span><input id="search" autocomplete="off" spellcheck="false" placeholder="Search your library…"></label><div id="searchSort" class="search-filter" hidden><button id="searchSortButton" type="button" aria-haspopup="listbox" aria-expanded="false"><span id="searchSortLabel">Title</span><svg viewBox="0 0 16 16" aria-hidden="true"><path d="m4 6 4 4 4-4"/></svg></button><div id="searchSortMenu" class="search-sort-menu" role="listbox" aria-label="Sort results"></div></div></div></header>
      <section id="content"></section>
    </main>

    <div id="serverTransferToast" class="server-transfer-toast" hidden>
      <span id="serverTransferIcon" class="transfer-toast-icon" aria-hidden="true"></span>
      <div>
        <strong id="serverTransferTitle">Downloading</strong>
        <small id="serverTransferDetail">Preparing transfer…</small>
        <div class="transfer-toast-progress"><progress id="serverTransferProgress" max="1" value="0"></progress><span id="serverTransferPercent">0%</span></div>
      </div>
      <button id="dismissServerTransfer" title="Dismiss" aria-label="Dismiss transfer status">×</button>
    </div>

    <footer class="playerbar">
      <div class="player-track"><div class="mini-art">♪</div><div><strong id="bottomTitle">Nothing playing</strong><small id="bottomMeta">Local library</small></div><button id="favoriteCurrent">♡</button></div>
      <div class="transport"><div><button id="shuffle" title="Shuffle" aria-label="Shuffle"><svg class="shuffle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h2.5a5 5 0 0 1 4 2l5 7a5 5 0 0 0 4 2H21"/><path d="m17 13 4 4-4 4"/><path d="M3 18h2.5a5 5 0 0 0 4-2l5-7a5 5 0 0 1 4-2H21"/><path d="m17 3 4 4-4 4"/></svg></button><button data-action="previous" title="Previous" aria-label="Previous"><svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5v14"/><path class="icon-fill" d="m18 6-9 6 9 6z"/></svg></button><button class="play-main" data-action="toggle" title="Play" aria-label="Play"><svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true"><path class="icon-fill" d="M8 5v14l11-7z"/></svg></button><button data-action="next" title="Next" aria-label="Next"><svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true"><path class="icon-fill" d="m6 6 9 6-9 6z"/><path d="M18 5v14"/></svg></button><button id="repeat" title="Repeat" aria-label="Repeat"><svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a3 3 0 0 1 3-3h15"/><path d="m7 22-4-4 4-4"/><path d="M21 13v2a3 3 0 0 1-3 3H3"/></svg></button></div><div class="timeline"><span id="elapsed">0:00</span><input id="seek" type="range" min="0" max="1000" value="0"><span id="duration">0:00</span></div></div>
      <div class="volume"><select id="speed"><option value="0.75">0.75×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select><span>🔊</span><input id="volume" type="range" min="0" max="1" step="0.01" value="0.78"><span id="volumeText">78%</span></div>
    </footer>
  </div>
  <dialog id="playlistDialog" class="playlist-dialog">
    <form id="playlistForm">
      <span class="eyebrow">NEW COLLECTION</span>
      <h2>Create playlist</h2>
      <label for="playlistName">Playlist name</label>
      <input id="playlistName" maxlength="80" autocomplete="off" placeholder="My playlist" required>
      <div class="dialog-actions"><button id="cancelPlaylist" class="secondary" type="button">Cancel</button><button class="primary" type="submit">Create</button></div>
    </form>
  </dialog>
  <dialog id="serverSettingsDialog" class="playlist-dialog">
    <form id="serverSettingsForm">
      <span class="eyebrow">CONNECTION</span>
      <h2>Music Server settings</h2>
      <label for="serverURL">Server URL</label>
      <input id="serverURL" autocomplete="url" placeholder="https://music.unblocked.mov" required>
      <label for="serverToken">Server access token</label>
      <input id="serverToken" type="password" autocomplete="off" required>
      <label for="serverAdminToken">Server admin key</label>
      <input id="serverAdminToken" type="password" autocomplete="off" placeholder="Optional for uploads and deletion">
      <div class="dialog-actions"><button id="cancelServerSettings" class="secondary" type="button">Cancel</button><button class="primary" type="submit">Save & connect</button></div>
    </form>
  </dialog>
  <div id="trackContextMenu" class="track-context-menu" role="menu" hidden></div>
  <audio id="audio"></audio>
  <script type="module" src="app.js"></script>
</body>
</html>
