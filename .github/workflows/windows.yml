name: Windows

on:
  pull_request:
    paths:
      - "windows/**"
      - "installers/windows/**"
      - ".github/workflows/windows.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: windows/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build installer
        run: pnpm run installer:win

      - name: Publish tagged release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $assets = @(
            (Resolve-Path "../installers/windows/dist/Resonance-Setup-*.exe").Path
            (Resolve-Path "../installers/windows/dist/Resonance-Setup-*.exe.blockmap").Path
            (Resolve-Path "../installers/windows/dist/latest.yml").Path
          )
          gh release create $env:GITHUB_REF_NAME @assets `
            --repo $env:GITHUB_REPOSITORY `
            --title "Resonance $env:GITHUB_REF_NAME" `
            --generate-notes `
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Resonance-Windows-${{ github.sha }}
          path: |
            installers/windows/dist/Resonance-Setup-*.exe
            installers/windows/dist/Resonance-Setup-*.exe.blockmap
            installers/windows/dist/latest.yml
          if-no-files-found: error
